<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 첫 웹 게임</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 8px; }
        canvas { border: 2px solid #555; background: #eee; display: block; max-width: 100%; touch-action: none; }
        #dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 4px;
            margin-top: 14px;
        }
        #dpad button {
            width: 60px; height: 60px;
            font-size: 26px;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            display: flex; align-items: center; justify-content: center;
        }
        #dpad button:active, #dpad button.pressed { background: rgba(255,255,255,0.4); }
        .dpad-empty { visibility: hidden; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button id="restartBtn" onclick="restartGame()" style="display:none; margin-top:14px; padding:12px 36px; font-size:18px; font-weight:bold; background:#ff4500; color:white; border:none; border-radius:12px; cursor:pointer;">🔄 다시하기</button>

    <div id="dpad">
        <div class="dpad-empty"></div>
        <button id="btn-up"    ontouchstart="touchBtn('up',true)"    ontouchend="touchBtn('up',false)">▲</button>
        <div class="dpad-empty"></div>
        <button id="btn-left"  ontouchstart="touchBtn('left',true)"  ontouchend="touchBtn('left',false)">◀</button>
        <div class="dpad-empty"></div>
        <button id="btn-right" ontouchstart="touchBtn('right',true)" ontouchend="touchBtn('right',false)">▶</button>
        <div class="dpad-empty"></div>
        <button id="btn-down"  ontouchstart="touchBtn('down',true)"  ontouchend="touchBtn('down',false)">▼</button>
        <div class="dpad-empty"></div>
    </div>

        const foodImgs = FOOD_IMG_SRCS.map(s => { const i = new Image(); i.src = s; return i; });

                function randomFood(stageImg) {
            const r = foodRadius;
            return {
                x: r * 2.5 + Math.random() * (canvas.width  - r * 5),
                y: r * 2.5 + Math.random() * (canvas.height - r * 5),
                r, img: stageImg
            };
        }

        function initFoods() {
            // 타요 이미지 셔플 후 FOOD_COUNT개 중복 없이 선택
            const shuffled = [...foodImgs].sort(() => Math.random() - 0.5);
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) {
                foods.push(randomFood(shuffled[i % shuffled.length]));
            }
        }

        function initFalling(hard) {
            fallingMode = true;
            fallingHard = hard;
            fallingFailed = false;
            fallingObjects = [];
            fallingStarsCollected = 0;
            fallingSpawnTimer = 0;
            fallingSpawnInterval = hard ? 40 : 60;
            player.size = 30;
            player.speed = 5;
            player.x = canvas.width  / 2 - 15;
            player.y = canvas.height - 60;
        }

        function updateFalling() {
            // 플레이어 좌우 이동만 허용
            if (!isDragging) {
                if (keys["ArrowLeft"]  || keys["a"]) player.x -= player.speed;
                if (keys["ArrowRight"] || keys["d"]) player.x += player.speed;
            }
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = canvas.height - 60; // 하단 고정

            // 낙하물 스폰
            const maxObjects = fallingHard ? 6 : 4;
            fallingSpawnTimer++;
            if (fallingSpawnTimer >= fallingSpawnInterval && fallingObjects.length < maxObjects) {
                fallingSpawnTimer = 0;
                const isBomb = Math.random() < (fallingHard ? 0.45 : 0.3);
                fallingObjects.push({
                    x: 20 + Math.random() * (canvas.width - 40),
                    y: -20, r: 18,
                    type: isBomb ? 'bomb' : 'star',
                    speed: (fallingHard ? 3.5 : 2.5) + Math.random() * 1.5
                });
            }

            // 낙하물 이동 및 충돌
            const px = player.x + player.size / 2;
            const py = player.y + player.size / 2;
            fallingObjects = fallingObjects.filter(obj => {
                obj.y += obj.speed;
                if (obj.y > canvas.height + 20) return false;
                if (Math.hypot(px - obj.x, py - obj.y) < player.size / 2 + obj.r) {
                    if (obj.type === 'bomb') {
                        fallingFailed = true;
                        gameOver = true;
                    } else {
                        fallingStarsCollected++;
                        player.score += 20;
                        if (fallingStarsCollected >= fallingStarsNeeded) {
                            if (!fallingHard) {
                                player.score += 100;
                                level++;
                                initFalling(true);
                            } else {
                                player.score += 200;
                                fallingMode = false;
                                gameOver = true;
                            }
                        }
                    }
                    return false;
                }
                return true;
            });
        }

        document.addEventListener("keydown", e => { keys[e.key] = true; e.preventDefault(); });
        document.addEventListener("keyup",   e => keys[e.key] = false);

        // 터치 D-패드
        function touchBtn(dir, isDown) {
            const map = { up: "ArrowUp", down: "ArrowDown", left: "ArrowLeft", right: "ArrowRight" };
            keys[map[dir]] = isDown;
        }
        // 버튼에서 손가락이 미끄러져 나가도 방향키가 풀리도록
        document.addEventListener("touchend",   () => { ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].forEach(k => keys[k] = false); });
        document.addEventListener("touchcancel",() => { ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].forEach(k => keys[k] = false); });

        // 캐릭터 직접 터치 드래그
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;

        canvas.addEventListener("touchstart", function(e) {
            if (gameOver) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const tx = (touch.clientX - rect.left) * scaleX;
            const ty = (touch.clientY - rect.top) * scaleY;
            const cx = player.x + player.size / 2;
            const cy = player.y + player.size / 2;
            if (Math.hypot(tx - cx, ty - cy) < player.size / 2 + 20) {
                isDragging = true;
                dragOffsetX = tx - cx;
                dragOffsetY = ty - cy;
                e.preventDefault();
            }
        }, { passive: false });

        canvas.addEventListener("touchmove", function(e) {
            if (!isDragging || gameOver) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const tx = (touch.clientX - rect.left) * scaleX;
            const ty = (touch.clientY - rect.top) * scaleY;
            const tnx = Math.max(0, Math.min(canvas.width  - player.size, tx - dragOffsetX - player.size / 2));
            const tny = Math.max(0, Math.min(canvas.height - player.size, ty - dragOffsetY - player.size / 2));
            player.x = tnx;
            player.y = tny;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener("touchend", function() {
            isDragging = false;
        });

        function update() {
            if (fallingMode) { updateFalling(); return; }

            if (!isDragging) {
                if (keys["ArrowLeft"]  || keys["a"]) player.x -= player.speed;
                if (keys["ArrowRight"] || keys["d"]) player.x += player.speed;
                if (keys["ArrowUp"]    || keys["w"]) player.y -= player.speed;
                if (keys["ArrowDown"]  || keys["s"]) player.y += player.speed;
            }

            player.x = Math.max(0, Math.min(canvas.width  - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

            // 음식 충돌 감지
            const px = player.x + player.size / 2;
            const py = player.y + player.size / 2;
            foods = foods.filter(f => {
                const dist = Math.hypot(px - f.x, py - f.y);
                if (dist < player.size / 2 + f.r) {
                    player.size += 4;
                    player.score += 10;
                    return false;
                }
                return true;
            });

            // 음식을 모두 먹으면 레벨업 (레벨9까지 먹기, 레벨10부터 낙하물 모드)
            if (foods.length === 0) {
                level++;
                if (level >= FALLING_START_LEVEL) {
                    initFalling(false);
                } else {
                    foodRadius = 8 + (level - 1) * 4;
                    initFoods();
                }
            }
        }


        function drawEnding() {
            const cw = canvas.width, ch = canvas.height;
            const t = Date.now() / 1000;

            // ─── 배경 ───
            const sky = ctx.createLinearGradient(0, 0, 0, ch);
            sky.addColorStop(0, "#1a1a4e");
            sky.addColorStop(0.5, "#3a3a8e");
            sky.addColorStop(1, "#6c6ccc");
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, cw, ch);

            // 반짝이는 별 (시간 기반)
            ctx.fillStyle = "white";
            [[30,25],[80,15],[150,40],[250,20],[340,35],[370,15],[60,60],[200,50],[310,60]].forEach(([x,y],i) => {
                const s = Math.abs(Math.sin(t*1.8 + i*0.7)) * 1.5 + 0.3;
                ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI*2); ctx.fill();
            });

            // 떠다니는 이모지
            ctx.font = "20px serif";
            ctx.fillText("🎵", 18 + Math.sin(t*1.5)*8,   90 + Math.sin(t*2)*6);
            ctx.fillText("🎵", cw-36 + Math.sin(t*1.8+1)*8, 108 + Math.sin(t*2.2)*6);
            ctx.fillText("⭐", cw/2-80 + Math.sin(t*1.3)*10, 74 + Math.sin(t*1.6)*5);
            ctx.fillText("⭐", cw/2+62 + Math.sin(t*1.7+2)*10, 80 + Math.sin(t*1.4+1)*5);

            // 제목
            ctx.textAlign = "center";
            ctx.shadowColor = "rgba(255,200,0,0.7)";
            ctx.shadowBlur = 14;
            ctx.font = "bold 28px sans-serif";
            ctx.fillStyle = "#FFD700";
            ctx.fillText("🎉 축하합니다! 🎉", cw / 2, 48);
            ctx.shadowBlur = 0;

            // ─── 춤추는 캐릭터 ───
            const bobY  = Math.sin(t * 4) * 6;
            const tilt  = Math.sin(t * 2) * 0.10;
            const armSw = Math.sin(t * 4) * 45;   // 팔 스윙 각도(도)
            const legSw = Math.sin(t * 4) * 35;   // 다리 스윙 각도(도)

            const cx    = cw / 2;
            const cy    = 228 + bobY;
            const HEAD_R = 42;
            const headCY = cy - 90;

            // 바닥 그림자
            ctx.fillStyle = "rgba(0,0,60,0.28)";
            ctx.beginPath();
            ctx.ellipse(cx, cy + 56, 32 + Math.abs(Math.sin(t*4))*4, 7, 0, 0, Math.PI*2);
            ctx.fill();

            // ── 왼쪽 다리 ──
            ctx.save();
            ctx.translate(cx - 12, cy + 8);
            ctx.rotate((-legSw) * Math.PI / 180);
            ctx.fillStyle = "#2255cc";
            ctx.beginPath(); ctx.roundRect(-8, 0, 16, 40, 8); ctx.fill();
            ctx.fillStyle = "#111133";
            ctx.beginPath(); ctx.roundRect(-11, 36, 22, 11, 5); ctx.fill();
            ctx.restore();

            // ── 오른쪽 다리 ──
            ctx.save();
            ctx.translate(cx + 12, cy + 8);
            ctx.rotate((legSw) * Math.PI / 180);
            ctx.fillStyle = "#2255cc";
            ctx.beginPath(); ctx.roundRect(-8, 0, 16, 40, 8); ctx.fill();
            ctx.fillStyle = "#111133";
            ctx.beginPath(); ctx.roundRect(-11, 36, 22, 11, 5); ctx.fill();
            ctx.restore();

            // ── 왼쪽 팔 (몸통 뒤) ──
            ctx.save();
            ctx.translate(cx - 22, cy - 38);
            ctx.rotate((35 - armSw) * Math.PI / 180);
            ctx.fillStyle = "#5599ff";
            ctx.beginPath(); ctx.roundRect(-7, 0, 14, 36, 7); ctx.fill();
            ctx.fillStyle = "#ffcc88";
            ctx.beginPath(); ctx.arc(0, 36, 9, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // ── 몸통 ──
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(tilt);
            ctx.fillStyle = "#5599ff";
            ctx.beginPath(); ctx.roundRect(-22, -48, 44, 55, 12); ctx.fill();
            // 셔츠 V라인 디테일
            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-8, -44); ctx.lineTo(0, -28); ctx.lineTo(8, -44);
            ctx.stroke();
            ctx.restore();

            // ── 오른쪽 팔 (몸통 앞) ──
            ctx.save();
            ctx.translate(cx + 22, cy - 38);
            ctx.rotate((-35 + armSw) * Math.PI / 180);
            ctx.fillStyle = "#5599ff";
            ctx.beginPath(); ctx.roundRect(-7, 0, 14, 36, 7); ctx.fill();
            ctx.fillStyle = "#ffcc88";
            ctx.beginPath(); ctx.arc(0, 36, 9, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // ── 머리 (플레이어 사진) ──
            if (playerImg && playerImg.complete && playerImg.naturalWidth > 0) {
                ctx.save();
                ctx.beginPath(); ctx.arc(cx, headCY, HEAD_R + 5, 0, Math.PI*2);
                const ring = ctx.createLinearGradient(cx-HEAD_R, headCY-HEAD_R, cx+HEAD_R, headCY+HEAD_R);
                ring.addColorStop(0, "#FFD700"); ring.addColorStop(1, "#FFA500");
                ctx.fillStyle = ring; ctx.fill();
                ctx.beginPath(); ctx.arc(cx, headCY, HEAD_R, 0, Math.PI*2); ctx.clip();
                ctx.drawImage(playerImg, cx - HEAD_R, headCY - HEAD_R, HEAD_R*2, HEAD_R*2);
                ctx.restore();
            } else {
                ctx.fillStyle = "#5599ff";
                ctx.beginPath(); ctx.arc(cx, headCY, HEAD_R, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(cx-13, headCY-8, 6, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx+13, headCY-8, 6, 0, Math.PI*2); ctx.fill();
            }

            // ─── 점수 / 하단 텍스트 ───
            ctx.textAlign = "center";
            ctx.shadowColor = "rgba(0,0,0,0.6)";
            ctx.shadowBlur = 5;
            ctx.font = "bold 22px sans-serif";
            ctx.fillStyle = "white";
            ctx.fillText(`최종 점수: ${player.score}점`, cw / 2, ch - 68);
            ctx.font = "14px sans-serif";
            ctx.fillStyle = "#aaccff";
            ctx.fillText("모든 레벨을 클리어했어요! 🌟", cw / 2, ch - 44);
            ctx.shadowBlur = 0;
            ctx.textAlign = "left";

            document.getElementById("restartBtn").style.display = "inline-block";
            document.getElementById("dpad").style.display = "none";
        }

        function restartGame() {
            level = 1;
            gameOver = false;
            foodRadius = 8;
            fallingMode = false;
            fallingFailed = false;
            fallingObjects = [];
            fallingStarsCollected = 0;
            fallingSpawnTimer = 0;
            player.x = 180; player.y = 180;
            player.size = 20; player.speed = 3; player.score = 0;
            playerImg = playerImgs[Math.floor(Math.random() * playerImgs.length)];
            document.getElementById("restartBtn").style.display = "none";
            document.getElementById("dpad").style.display = "grid";
            initFoods();
        }

        function drawFallingFail() {
            const cw = canvas.width, ch = canvas.height;
            ctx.fillStyle = "#1a0000";
            ctx.fillRect(0, 0, cw, ch);
            ctx.textAlign = "center";
            ctx.shadowColor = "#ff0000";
            ctx.shadowBlur = 14;
            ctx.font = "bold 38px sans-serif";
            ctx.fillStyle = "#ff4444";
            ctx.fillText("💣 폭발!", cw / 2, ch / 2 - 55);
            ctx.shadowBlur = 0;
            ctx.font = "bold 22px sans-serif";
            ctx.fillStyle = "white";
            ctx.fillText(`도달 레벨: ${level}`, cw / 2, ch / 2);
            ctx.fillText(`획득 별: ${fallingStarsCollected}/${fallingStarsNeeded}`, cw / 2, ch / 2 + 36);
            ctx.font = "15px sans-serif";
            ctx.fillStyle = "#ffaaaa";
            ctx.fillText("다시 도전해봐요! 화이팅 💪", cw / 2, ch / 2 + 76);
            ctx.textAlign = "left";
            document.getElementById("restartBtn").style.display = "inline-block";
            document.getElementById("dpad").style.display = "none";
        }

        function drawFallingGame() {
            const cw = canvas.width, ch = canvas.height;
            const bg = ctx.createLinearGradient(0, 0, 0, ch);
            bg.addColorStop(0, "#001133");
            bg.addColorStop(1, "#003366");
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, cw, ch);

            // 낙하물 그리기
            ctx.textAlign = "center";
            fallingObjects.forEach(obj => {
                ctx.font = "32px serif";
                if (obj.type === 'bomb') {
                    ctx.fillText("💣", obj.x, obj.y + 12);
                } else {
                    ctx.fillText("⭐", obj.x, obj.y + 12);
                }
            });

            // 플레이어 그리기
            const px = player.x + player.size / 2;
            const py = player.y + player.size / 2;
            ctx.beginPath();
            ctx.arc(px, py, player.size / 2, 0, Math.PI * 2);
            ctx.fillStyle = "#3399ff";
            ctx.fill();
            if (playerImg && playerImg.complete && playerImg.naturalWidth > 0) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(px, py, player.size / 2, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
                ctx.restore();
                ctx.beginPath();
                ctx.arc(px, py, player.size / 2, 0, Math.PI * 2);
                ctx.strokeStyle = "#00ccff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // HUD
            ctx.textAlign = "left";
            ctx.fillStyle = "white";
            ctx.font = "bold 14px sans-serif";
            const diffLabel = fallingHard ? "🔥 어려움 (레벨11)" : "⭐ 보통 (레벨10)";
            ctx.fillText(`별: ${fallingStarsCollected}/${fallingStarsNeeded}  점수: ${player.score}  ${diffLabel}`, 8, 20);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameOver) {
                if (fallingFailed) { drawFallingFail(); }
                else { drawEnding(); }
                return;
            }
            if (fallingMode) { drawFallingGame(); return; }

            // 자동차 음식 그리기
            // 타요 이미지 - 원형 클리핑
            foods.forEach(f => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                ctx.clip();
                if (f.img && f.img.complete && f.img.naturalWidth > 0) {
                    ctx.drawImage(f.img, f.x - f.r, f.y - f.r, f.r * 2, f.r * 2);
                } else {
                    ctx.fillStyle = "#ffd700"; ctx.fill();
                }
                ctx.restore();
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
            });

            // 플레이어 그리기 (원형)
            const px = player.x + player.size / 2;
            const py = player.y + player.size / 2;
            ctx.beginPath();
            ctx.arc(px, py, player.size / 2, 0, Math.PI * 2);
            ctx.fillStyle = "#3399ff";
            ctx.fill();
            ctx.strokeStyle = "#0055cc";
            ctx.lineWidth = 2;
            ctx.stroke();

            if (playerImg) {
                // 이미지를 원형 클리핑해서 그리기
                ctx.save();
                ctx.beginPath();
                ctx.arc(px, py, player.size / 2, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
                ctx.restore();
                ctx.beginPath();
                ctx.arc(px, py, player.size / 2, 0, Math.PI * 2);
                ctx.strokeStyle = "#0055cc";
                ctx.lineWidth = 2;
                ctx.stroke();
            } else {
                // 눈 그리기 (기본 캐릭터)
                const eyeOffset = player.size * 0.18;
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(px - eyeOffset, py - eyeOffset * 0.5, player.size * 0.12, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(px + eyeOffset, py - eyeOffset * 0.5, player.size * 0.12, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#222";
                ctx.beginPath(); ctx.arc(px - eyeOffset, py - eyeOffset * 0.5, player.size * 0.06, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(px + eyeOffset, py - eyeOffset * 0.5, player.size * 0.06, 0, Math.PI * 2); ctx.fill();
            }

            // 점수 표시
            ctx.fillStyle = "#333";
            ctx.font = "bold 16px sans-serif";
            ctx.fillText(`레벨: ${level}  점수: ${player.score}  크기: ${player.size}`, 8, 20);
        }

        function loop() {
            if (!gameOver) update();
            draw();
            requestAnimationFrame(loop);
        }

        // 게임 시작: 지니 폴더에서 랜덤 캐릭터 선택 (게임 내내 유지)
        playerImg = playerImgs[Math.floor(Math.random() * playerImgs.length)];
        initFoods();
        loop();
    </script>
</body>
</html>
